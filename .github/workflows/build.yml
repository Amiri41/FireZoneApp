name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f FireZone_AndroidStudio_final.zip ]; then
            unzip -o FireZone_AndroidStudio_final.zip -d extracted
            # لو الملفات جات داخل مجلد فرعي واحد، ننقلوها للجذر
            if [ "$(ls extracted | wc -l)" -eq 1 ] && [ -d "extracted/$(ls extracted)" ]; then
              mv extracted/*/* .
            else
              mv extracted/* .
            fi
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
